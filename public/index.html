<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proxy Browser</title>
  
  <style>
    /* --- Theming & Variables --- */
    :root {
      --bg-color: #e0e5ec;
      --shadow-light: #ffffff;
      --shadow-dark: #a3b1c6;
      --text-color: #4a4a4a;
    }

    [data-theme="dark"] {
      --bg-color: #2b2b2b;
      --shadow-light: #3a3a3a;
      --shadow-dark: #1c1c1c;
      --text-color: #e0e5ec;
    }

    body {
      margin: 0;
      padding: 5px 20px 0 20px; 
      height: 100vh;
      box-sizing: border-box;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      transition: background-color 0.4s ease, color 0.4s ease;
      display: flex;
      flex-direction: column;
      gap: 15px;
      overflow: hidden; 
      position: relative; 
    }

    /* --- Animations --- */
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* --- UI Components --- */
    .tab-container {
      display: flex;
      gap: 10px;
      overflow-x: auto; 
      padding: 5px;
      scrollbar-width: none; 
      flex-shrink: 0; 
      scroll-behavior: smooth;
      
      /* THIS KEEPS THE TOOLTIP IN FRONT OF THE SEARCH BAR */
      position: relative;
      z-index: 1000; 
    }
    
    .tab-container::-webkit-scrollbar {
      display: none; 
    }

    .neo-btn {
      border: none;
      outline: none;
      background-color: var(--bg-color);
      color: var(--text-color);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 5px 5px 10px var(--shadow-dark), 
                 -5px -5px 10px var(--shadow-light);
      transition: all 0.2s ease-in-out;
      flex-shrink: 0;
    }

    .neo-btn:active {
      box-shadow: inset 5px 5px 10px var(--shadow-dark), 
                  inset -5px -5px 10px var(--shadow-light);
    }

    .tab-btn {
      width: auto;
      border-radius: 20px; 
      padding: 8px 15px;
      gap: 8px;
      white-space: nowrap;
      animation: fadeIn 0.3s ease forwards;
      position: relative; 
    }

    .tab-btn.active {
      box-shadow: inset 5px 5px 10px var(--shadow-dark), 
                  inset -5px -5px 10px var(--shadow-light);
      color: #007bff;
    }

    /* --- Proxy Hover Tooltip --- */
    .tab-btn::after {
      content: "Server: " attr(data-proxy-name);
      position: absolute;
      bottom: -32px; /* Adjusted slightly */
      left: 50%;
      transform: translateX(-50%);
      background-color: var(--text-color);
      color: var(--bg-color);
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: bold;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s ease;
      z-index: 9999; /* Ensures it stays on top */
      box-shadow: 2px 2px 8px rgba(0,0,0,0.3);
      pointer-events: none;
    }

    .tab-btn:hover::after {
      opacity: 1;
      visibility: visible;
      bottom: -6px; 
            z-index: 9999; /* Ensures it stays on top */

    }

    /* Favicon & Spinner */
    .tab-icon {
      width: 16px;
      height: 16px;
      display: none; 
      border-radius: 50%;
    }

    .spinner {
      display: none; 
      width: 14px;
      height: 14px;
      border: 2px solid var(--text-color);
      border-top: 2px solid transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .tab-btn.active .spinner {
      border-color: #007bff;
      border-top-color: transparent;
    }

    .close-tab {
      background: none;
      border: none;
      color: inherit;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.6;
      transition: all 0.2s;
    }

    .close-tab:hover {
      opacity: 1;
      background-color: var(--shadow-dark);
      color: #fff;
    }

    /* --- Controls & Iframe --- */
    form {
      display: flex;
      gap: 15px;
      align-items: center;
      padding: 15px 25px;
      border-radius: 15px;
      background-color: var(--bg-color);
      box-shadow: 9px 9px 16px var(--shadow-dark), 
                 -9px -9px 16px var(--shadow-light);
      flex-shrink: 0; 
      position: relative;
      z-index: 100; /* Lower than tabs so tooltip goes over it */
    }

    .search-input, select {
      border: none;
      outline: none;
      background-color: var(--bg-color);
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 16px;
      color: var(--text-color);
    }

    .search-input {
      flex-grow: 1;
      box-shadow: inset 5px 5px 10px var(--shadow-dark), 
                  inset -5px -5px 10px var(--shadow-light);
    }

    .search-input:focus {
      box-shadow: inset 7px 7px 12px var(--shadow-dark), 
                  inset -7px -7px 12px var(--shadow-light);
    }

    select {
      cursor: pointer;
      box-shadow: 5px 5px 10px var(--shadow-dark), 
                 -5px -5px 10px var(--shadow-light);
    }

    /* --- Iframe Container --- */
    .iframe-wrapper {
      position: absolute;
      top: 175px; 
      bottom: 20px; 
      left: 20px;
      right: 20px;
      border-radius: 15px; 
      padding: 10px; 
      background-color: var(--bg-color);
      box-shadow: inset 7px 7px 14px var(--shadow-dark), 
                  inset -7px -7px 14px var(--shadow-light);
      box-sizing: border-box;
      z-index: 10; /* Base level */
    }

    .browser-frame {
      display: none;
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 10px; 
      background-color: #fff; 
    }

    .browser-frame.active {
      display: block;
      animation: fadeIn 0.4s ease forwards;
    }
  </style>
</head>
<body>

  <div class="tab-container" id="tab-container">
    <button class="neo-btn tab-btn active" data-id="tab-1" data-proxy="scramjet" data-proxy-name="Scramjet">
      <span class="spinner" id="spinner-tab-1"></span>
      <img class="tab-icon" id="icon-tab-1" src="" />
      <span class="tab-title" id="title-tab-1">Startup</span>
      <span class="close-tab" title="Close Tab">×</span>
    </button>
    <button class="neo-btn" id="add-tab-btn" title="New Tab">+</button>
  </div>

  <form id="idk">
    <button type="button" id="back-btn" class="neo-btn" title="Back">◀</button>
    <button type="button" id="forward-btn" class="neo-btn" title="Forward">▶</button>
    <button type="button" id="refresh-btn" class="neo-btn" title="Refresh">↻</button>

    <input
      id="url"
      type="text"
      class="search-input search"
      placeholder="Search or enter URL"
      autocomplete="off"
    />
    
    <select id="proxysel">
      <option value="scramjet">Recommended: Scramjet</option>
      <option value="uv">Server: Ultraviolet</option>
    </select>
  </form>

  <div class="iframe-wrapper" id="views-container">
    <iframe id="iframe" src="idle.html" class="browser-frame frame-tab-1 active"></iframe>
  </div>

  <script src="/baremux/index.js" defer></script>
  <script src="/uv/uv.bundle.js" defer></script>
  <script src="/uv/uv.config.js" defer></script>
  <script src="/scram/scramjet.all.js" defer></script>
  <script src="/stuff.js" defer></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (localStorage.getItem("theme") === "dark") {
        document.documentElement.setAttribute("data-theme", "dark");
      }

      let tabCount = 1;
      let activeTabId = "tab-1";
      const MAX_TABS = 10;
      
      const tabContainer = document.getElementById("tab-container");
      const viewsContainer = document.getElementById("views-container");
      const addTabBtn = document.getElementById("add-tab-btn");
      const form = document.getElementById("idk");
      const searchInput = document.getElementById("url");
      const proxySelect = document.getElementById("proxysel");

      // --- Custom Routing Logic ---
      function uvEncode(str) {
        if (!str) return str;
        return encodeURIComponent(
          str.toString().split('').map((char, ind) => {
            return ind % 2 ? String.fromCharCode(char.charCodeAt(0) ^ 2) : char;
          }).join('')
        );
      }

      // Reloads the active frame using the provided proxy
      function loadUrlInIframe(query, proxyType) {
        if (!query || query === "idle.html" || query === "about:blank") return;

        let targetUrl = query.trim();
        if (!targetUrl.startsWith('http://') && !targetUrl.startsWith('https://')) {
            if (targetUrl.includes('.') && !targetUrl.includes(' ')) {
                targetUrl = 'https://' + targetUrl;
            } else {
                targetUrl = 'https://www.google.com/search?q=' + encodeURIComponent(targetUrl);
            }
        }

        try {
            if (targetUrl.startsWith('http')) {
                targetUrl = new URL(targetUrl).toString(); 
            }
        } catch (e) {}

        let finalUrl = '';
        if (proxyType === 'uv') {
            finalUrl = '/service/uv/' + uvEncode(targetUrl);
        } else {
            finalUrl = '/scramjet/' + targetUrl;
        }

        const activeFrame = document.getElementById("iframe");
        if (activeFrame) {
            showSpinner(activeTabId);
            activeFrame.src = finalUrl;
        }
      }

      function scrollToActiveTab() {
        const activeTabBtn = document.querySelector(`.tab-btn[data-id="${activeTabId}"]`);
        if (activeTabBtn) {
          activeTabBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }
      }

      function updateGlobalProxyState(proxyValue) {
        proxySelect.value = proxyValue;
        localStorage.setItem("proxyServer", proxyValue);
      }

// --- URL & TAB LOGIC ---
      function updateTabAndUrl() {
        const activeFrame = document.getElementById("iframe");
        if (!activeFrame) return;

        try {
          const win = activeFrame.contentWindow;
          const frameHref = win.location.href;
          const activeTabBtn = document.querySelector(`.tab-btn[data-id="${activeTabId}"]`);
          const tabTitleSpan = document.getElementById(`title-${activeTabId}`);
          const iconImg = document.getElementById(`icon-${activeTabId}`);
          
          let currentProxy = "scramjet";
          let currentProxyName = "Scramjet";

          // 1. Check for idle/startup page
          if (frameHref.includes("idle.html") || frameHref === "about:blank" ) {
            searchInput.value = "";
            if (tabTitleSpan) tabTitleSpan.textContent = "Startup";
            if (iconImg) {
              iconImg.style.display = "none";
              iconImg.src = "";
            }
            
            // --- THE FIX IS HERE ---
            // Instead of forcing Scramjet, grab the currently selected proxy from localStorage
            currentProxy = localStorage.getItem("proxyServer") || "scramjet";
            currentProxyName = currentProxy === "uv" ? "Ultraviolet" : "Scramjet";
            // -----------------------
            
          } else {
            // 2. Extract URL & Proxy type
            let targetUrl = frameHref;
            if (win.__uv$location && win.__uv$location.href) {
              targetUrl = win.__uv$location.href;
              currentProxy = "uv";
              currentProxyName = "Ultraviolet";
            } else if (frameHref.includes('/scramjet/')) {
              targetUrl = decodeURIComponent(frameHref.substring(frameHref.indexOf('/scramjet/') + 10));
              currentProxy = "scramjet";
              currentProxyName = "Scramjet";
            } else if (frameHref.includes('/uv/service/')) {
              targetUrl = decodeURIComponent(frameHref.substring(frameHref.indexOf('/uv/service/') + 12));
              currentProxy = "uv";
              currentProxyName = "Ultraviolet";
            }
            
            searchInput.value = targetUrl;

            // 3. Update Title
            const doc = activeFrame.contentDocument || win.document;
            if (doc.title && tabTitleSpan) {
              const maxLen = 18;
              tabTitleSpan.textContent = doc.title.length > maxLen ? doc.title.substring(0, maxLen) + "..." : doc.title;
            }

            // 4. Fetch Favicon
            try {
              if (iconImg) {
                const parsedUrl = new URL(targetUrl);
                iconImg.onload = () => { iconImg.style.display = "inline-block"; }; 
                iconImg.onerror = () => { iconImg.style.display = "none"; }; 
                iconImg.src = `https://www.google.com/s2/favicons?domain=${parsedUrl.hostname}&sz=32`;
              }
            } catch(e) {}
          }

          if (activeTabBtn) {
            activeTabBtn.setAttribute("data-proxy", currentProxy);
            activeTabBtn.setAttribute("data-proxy-name", currentProxyName);
          }
          updateGlobalProxyState(currentProxy);

        } catch (e) {
          console.warn("Cross-origin frame read error:", e);
        }
      }
      function showSpinner(tabId) {
        const spinner = document.getElementById(`spinner-${tabId}`);
        const icon = document.getElementById(`icon-${tabId}`);
        if (spinner) spinner.style.display = 'inline-block';
        if (icon) icon.style.display = 'none'; 
      }

      function hideSpinner(tabId) {
        const spinner = document.getElementById(`spinner-${tabId}`);
        const icon = document.getElementById(`icon-${tabId}`);
        if (spinner) spinner.style.display = 'none';
        
        if (icon && icon.src && !icon.src.endsWith(window.location.host + "/")) {
          icon.style.display = 'inline-block';
        }
      }

      function switchTab(tabId) {
        document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
        const newActiveBtn = document.querySelector(`.tab-btn[data-id="${tabId}"]`);
        newActiveBtn.classList.add("active");

        document.querySelectorAll(".browser-frame").forEach(frame => {
          frame.classList.remove("active");
          if (frame.id === "iframe") {
            frame.removeAttribute("id");
          }
        });

        const activeFrame = document.querySelector(`.frame-${tabId}`);
        activeFrame.classList.add("active");
        activeFrame.id = "iframe"; 
        
        activeTabId = tabId;
        
        const tabProxy = newActiveBtn.getAttribute("data-proxy") || "scramjet";
        updateGlobalProxyState(tabProxy);

        updateTabAndUrl();
        scrollToActiveTab();
      }

      function closeTab(tabId, event) {
        event.stopPropagation();
        const allTabs = document.querySelectorAll(".tab-btn");
        if (allTabs.length === 1) return; 

        const tabBtnToRemove = document.querySelector(`.tab-btn[data-id="${tabId}"]`);
        const frameToRemove = document.querySelector(`.frame-${tabId}`);

        if (activeTabId === tabId) {
          let nextTabToActivate = tabBtnToRemove.previousElementSibling;
          if (!nextTabToActivate || !nextTabToActivate.classList.contains("tab-btn")) {
            nextTabToActivate = tabBtnToRemove.nextElementSibling;
          }
          if (nextTabToActivate && nextTabToActivate.classList.contains("tab-btn")) {
            switchTab(nextTabToActivate.getAttribute("data-id"));
          }
        }

        tabBtnToRemove.remove();
        frameToRemove.remove();
      }

      function createNewTab() {
        const currentTabs = document.querySelectorAll(".tab-btn").length;
        if (currentTabs >= MAX_TABS) return; 

        tabCount++;
        const newTabId = `tab-${tabCount}`;

        const newTabBtn = document.createElement("button");
        newTabBtn.className = "neo-btn tab-btn";
        newTabBtn.setAttribute("data-id", newTabId);
        newTabBtn.setAttribute("data-proxy", "scramjet");
        newTabBtn.setAttribute("data-proxy-name", "Scramjet");
        
        newTabBtn.innerHTML = `
          <span class="spinner" id="spinner-${newTabId}"></span>
          <img class="tab-icon" id="icon-${newTabId}" src="" />
          <span class="tab-title" id="title-${newTabId}">Startup</span>
          <span class="close-tab" title="Close Tab">×</span>
        `;
        newTabBtn.addEventListener("click", () => switchTab(newTabId));
        newTabBtn.querySelector(".close-tab").addEventListener("click", (e) => closeTab(newTabId, e));
        
        tabContainer.insertBefore(newTabBtn, addTabBtn);

        const newFrame = document.createElement("iframe");
        newFrame.className = `browser-frame frame-${newTabId}`;
        newFrame.src = "idle.html";
        
        newFrame.addEventListener("load", () => {
          hideSpinner(newTabId);
          if (activeTabId === newTabId) updateTabAndUrl();
        });

        viewsContainer.appendChild(newFrame);
        switchTab(newTabId);
      }

      // --- Initialization ---
      const firstTabBtn = document.querySelector(`[data-id="tab-1"]`);
      const firstIframe = document.querySelector(".frame-tab-1");
      
      firstTabBtn.addEventListener("click", () => switchTab("tab-1"));
      firstTabBtn.querySelector(".close-tab").addEventListener("click", (e) => closeTab("tab-1", e));
      
      firstIframe.addEventListener("load", () => {
        hideSpinner("tab-1");
        if (activeTabId === "tab-1") updateTabAndUrl();
      });
      
      addTabBtn.addEventListener("click", createNewTab);

      // --- Handles Enter Key Submits safely inside index.html ---
      form.addEventListener("submit", (e) => {
        e.preventDefault(); 
        loadUrlInIframe(searchInput.value, proxySelect.value);
      });

      // Navigation
      document.getElementById("back-btn").addEventListener("click", () => {
        try { document.getElementById("iframe").contentWindow.history.back(); } catch(e) {}
      });

      document.getElementById("forward-btn").addEventListener("click", () => {
        try { document.getElementById("iframe").contentWindow.history.forward(); } catch(e) {}
      });

      document.getElementById("refresh-btn").addEventListener("click", () => {
        showSpinner(activeTabId);
        const activeFrame = document.getElementById("iframe");
        try { 
          activeFrame.contentWindow.location.reload(); 
        } catch(e) { 
          activeFrame.src = activeFrame.src; 
        }
      });

      // --- Server Dropdown & Auto-Refresh Logic ---
      const savedProxy = localStorage.getItem("proxyServer");
      if (savedProxy) {
        updateGlobalProxyState(savedProxy);
        firstTabBtn.setAttribute("data-proxy", savedProxy);
        firstTabBtn.setAttribute("data-proxy-name", savedProxy === "uv" ? "Ultraviolet" : "Scramjet");
      } else {
        updateGlobalProxyState("scramjet");
      }

      // The Magic Trigger
      proxySelect.addEventListener("change", (e) => {
        const val = e.target.value;
        updateGlobalProxyState(val);
        
        const activeTabBtn = document.querySelector(`.tab-btn[data-id="${activeTabId}"]`);
        if (activeTabBtn) {
            activeTabBtn.setAttribute("data-proxy", val);
            activeTabBtn.setAttribute("data-proxy-name", val === "uv" ? "Ultraviolet" : "Scramjet");
        }

        // If there is an active link in the search bar, immediately reload it using the new proxy!
        const currentUrl = searchInput.value;
        if (currentUrl && currentUrl !== "idle.html") {
            loadUrlInIframe(currentUrl, val);
        }
      });
    });
  </script>
</body>
</html>
