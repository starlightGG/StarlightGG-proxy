<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neumorphic Search Display</title>
    <script>
        /* Check localStorage before the body renders to prevent white flash */
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme !== 'dark') {
                document.documentElement.classList.add('dark-theme');
            }
        })();
    </script>
    <style>
        /* --- CORE VARIABLES --- */
        :root {
            --bg-color: #e0e5ec;
            --text-color: #333333;
            --primary-color: #4c68ff;
            --font-stack: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;

            /* Neumorphic Shadows (Light) */
            --shadow-light-top: -6px -6px 12px #ffffff;
            --shadow-light-bottom: 6px 6px 12px rgba(0, 0, 0, 0.15);
            --shadow-inset: inset 4px 4px 8px rgba(0, 0, 0, 0.1), inset -4px -4px 8px #ffffff;
            
            /* Animation Timing */
            --bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* --- DARK THEME OVERRIDES --- */
        .dark-theme {
            --bg-color: #1a1d23;
            --text-color: #e0e5ec;
            --shadow-light-top: -6px -6px 12px #252932;
            --shadow-light-bottom: 6px 6px 12px #0f1115;
            --shadow-inset: inset 4px 4px 8px #0f1115, inset -4px -4px 8px #252932;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-stack);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative; 
        }

        /* --- KEYFRAMES FOR ANIMATIONS --- */
        @keyframes slideFadeUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes drawStroke {
            0% { stroke-dashoffset: 65; opacity: 1; }
            100% { stroke-dashoffset: 0; opacity: 1; }
        }
        
        @keyframes pulseBorder {
            0%, 100% { border-color: var(--primary-color); box-shadow: var(--shadow-inset), 0 0 0px transparent; }
            50% { border-color: rgba(76, 104, 255, 0.4); box-shadow: var(--shadow-inset), 0 0 15px rgba(76, 104, 255, 0.2); }
        }

        .display-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            width: 100%;
            max-width: 500px;
        }

        /* --- Default Hidden States (Waits for .is-loaded) --- */
        .icon-wrapper, .label, form, .app-btn, .info {
            opacity: 0;
        }

        .icon-circle svg path {
            stroke-dasharray: 65;
            stroke-dashoffset: 65;
            opacity: 0;
        }

        /* --- TRIGGER ANIMATIONS ON LOAD --- */
        .is-loaded .icon-wrapper {
            animation: slideFadeUp 0.8s var(--bounce) forwards, float 4s ease-in-out infinite alternate 0.8s;
        }

        .is-loaded .icon-circle svg path {
            animation: drawStroke 1.5s ease-out forwards 0.2s; /* Slight delay to let it slide up first */
        }

        .is-loaded .label {
            animation: slideFadeUp 0.8s var(--bounce) forwards 0.1s;
        }

        .is-loaded form {
            animation: slideFadeUp 0.8s var(--bounce) forwards 0.2s;
        }

        .is-loaded .app-btn {
            animation: slideFadeUp 0.8s var(--bounce) forwards;
        }

        /* Staggered buttons */
        .is-loaded .app-btn:nth-child(1) { animation-delay: 0.3s; }
        .is-loaded .app-btn:nth-child(2) { animation-delay: 0.4s; }
        .is-loaded .app-btn:nth-child(3) { animation-delay: 0.5s; }

        .is-loaded .info {
            animation: slideFadeUp 1s ease forwards 0.8s;
        }


        /* --- Main Top Icon --- */
        .icon-circle {
            width: 80px;
            height: 80px;
            background: var(--bg-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: var(--shadow-light-top), var(--shadow-light-bottom);
            color: var(--primary-color);
            transition: all 0.4s var(--bounce);
        }

        .icon-circle svg {
            width: 35px;
            height: 35px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: transform 0.5s var(--bounce);
        }

        .icon-circle:hover {
            box-shadow: 8px 8px 16px rgba(0, 0, 0, 0.15), -8px -8px 16px var(--shadow-light-top);
            transform: scale(1.05);
        }

        .icon-circle:hover svg {
            transform: rotate(90deg) scale(1.2);
        }

        .label {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-color);
        }

        /* --- Search Bar --- */
        form {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 5px;
            padding: 0 20px; 
            box-sizing: border-box;
        }

        .search-input {
            width: 100%;
            max-width: 450px;
            padding: 15px 25px;
            border: 2px solid transparent; 
            outline: none;
            border-radius: 30px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
            box-shadow: var(--shadow-inset);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-sizing: border-box; 
        }

        .search-input:hover {
            box-shadow: inset 6px 6px 15px rgba(0, 0, 0, 0.2), inset -6px -6px 15px var(--shadow-light-top);
        }

        .search-input:focus {
            box-shadow: inset 6px 6px 12px rgba(0, 0, 0, 0.15), inset -6px -6px 12px var(--shadow-light-top);
            animation: pulseBorder 2s infinite; 
            transform: scale(1.02);
        }

        /* --- App Buttons --- */
        .buttons-container {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .app-btn {
            width: 80px;
            height: 80px;
            border: none;
            outline: none;
            border-radius: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            cursor: pointer;
            box-shadow: var(--shadow-light-top), var(--shadow-light-bottom);
            transition: all 0.4s var(--bounce); 
            
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .app-btn:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 10px 10px 20px rgba(0, 0, 0, 0.15), -10px -10px 20px var(--shadow-light-top);
        }

        .app-btn:active {
            transform: translateY(2px) scale(0.95);
            box-shadow: var(--shadow-inset);
            color: var(--primary-color);
            transition: all 0.1s;
        }

        .app-icon {
            width: 28px;
            height: 28px;
            fill: currentColor; 
            transition: transform 0.4s var(--bounce), color 0.3s ease;
        }

        .app-btn:hover .app-icon {
            transform: scale(1.3) translateY(-2px);
            color: var(--primary-color);
        }

        .app-title {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            opacity: 0.8;
            transition: all 0.3s ease;
        }

        .app-btn:hover .app-title {
            opacity: 1;
            color: var(--primary-color);
        }

        /* --- Bottom Info --- */
        .info {
            position: absolute;
            bottom: 5px; 
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-color);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="display-container">
        
        <div class="icon-wrapper">
            <div class="icon-circle">
                <svg viewBox="0 0 24 24">
                    <path d="M 21 21 L 16.65 16.65 A 8 8 0 1 1 5.34 5.34 A 8 8 0 1 1 16.65 16.65" />
                </svg>
            </div>
        </div>
        
        <div class="label">Starlight<span style="color: var(--primary-color)">GG</span> Proxy</div>

        <form id="search-form">
            <input 
                type="text" 
                id="search-input" 
                class="search-input" 
                placeholder="Search the web or enter URL..." 
                autocomplete="off"
                autofocus
            >
        </form>

        <div class="buttons-container">
            
            <button type="button" class="app-btn" data-url="https://www.google.com">
                <svg class="app-icon" viewBox="0 0 24 24">
                    <path d="M12.24 10.285V14.4h6.806c-.275 1.765-2.056 5.174-6.806 5.174-4.095 0-7.439-3.389-7.439-7.574s3.345-7.574 7.439-7.574c2.33 0 3.891.989 4.785 1.849l3.254-3.138C18.189 1.186 15.479 0 12.24 0c-6.635 0-12 5.365-12 12s5.365 12 12 12c6.926 0 11.52-4.869 11.52-11.726 0-.788-.085-1.39-.189-1.989H12.24z"/>
                </svg>
                <span class="app-title">Google</span>
            </button>

            <button type="button" class="app-btn" data-url="https://fmhy.net">
                <svg class="app-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                <span class="app-title">FMHY</span>
            </button>

            <button type="button" class="app-btn" data-url="https://duckduckgo.com">
                <svg class="app-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    <circle cx="12" cy="11" r="3"></circle>
                    <line x1="14.5" y1="13.5" x2="16.5" y2="15.5"></line>
                </svg>
                <span class="app-title">DuckDuckGo</span>
            </button>

        </div>
    </div>

    <div class="info">Some websites may not be usable on here!</div>

    <script>
        // --- Wait for the entire page to load before starting animations ---
        window.addEventListener('load', () => {
            document.body.classList.add('is-loaded');
        });

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('search-form');
            const input = document.getElementById('search-input');
            const appButtons = document.querySelectorAll('.app-btn');

            function uvEncode(str) {
                if (!str) return str;
                return encodeURIComponent(
                    str.toString().split('').map((char, ind) => {
                        return ind % 2 ? String.fromCharCode(char.charCodeAt(0) ^ 2) : char;
                    }).join('')
                );
            }

            function navigateTo(query) {
                if (!query) return;

                let targetUrl = query;
                if (!targetUrl.startsWith('http://') && !targetUrl.startsWith('https://')) {
                    if (targetUrl.includes('.') && !targetUrl.includes(' ')) {
                        targetUrl = 'https://' + targetUrl;
                    } else {
                        targetUrl = 'https://www.google.com/search?q=' + encodeURIComponent(targetUrl);
                    }
                }

                try {
                    if (targetUrl.startsWith('http')) {
                        targetUrl = new URL(targetUrl).toString(); 
                    }
                } catch (e) {
                    // Ignore if URL is somehow invalid
                }

                const proxy = localStorage.getItem('proxyServer') || 'scramjet';
                let finalUrl = '';

                if (proxy === 'scramjet') {
                    finalUrl = '/scramjet/' + targetUrl; 
                } else if (proxy === 'uv') {
                    finalUrl = '/service/uv/' + uvEncode(targetUrl);
                } else {
                    finalUrl = '/scramjet/' + targetUrl;
                }

                document.body.style.transition = 'opacity 0.5s ease';
                document.body.style.opacity = '0';
                
                setTimeout(() => {
                    window.location.href = finalUrl;
                }, 400); 
            }

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                navigateTo(input.value.trim());
            });

            appButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    navigateTo(btn.getAttribute('data-url'));
                });
            });
        });
    </script>
</body>
</html>
